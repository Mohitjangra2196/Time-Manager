<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gate Register - Quick Action View</title>
    <script src="https://cdn.jsdelivr.net/npm/pouchdb@8.0.1/dist/pouchdb.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .dept-header { background-color: #f1f5f9; border-top: 1px solid #cbd5e1; border-bottom: 1px solid #cbd5e1; cursor: pointer; }
        .action-btn { font-size: 10px; font-weight: 900; padding: 10px 2px; border-radius: 6px; text-align: center; color: white; transition: all 0.1s; border: 2px solid transparent; }
        .action-btn:active { transform: scale(0.9); opacity: 0.8; }
        
        /* Active/Done States */
        .btn-done { border-color: rgba(0,0,0,0.2); opacity: 0.9; position: relative; }
        .btn-done::after { content: '✓'; position: absolute; top: -5px; right: -2px; font-size: 8px; color: white; background: black; border-radius: 50%; width: 12px; height: 12px; display: flex; align-items: center; justify-content: center; }

        .bg-duty-in { background-color: #2563eb; }    /* Blue (DI) */
        .bg-lunch-out { background-color: #f59e0b; }  /* Orange (LO) */
        .bg-lunch-in { background-color: #10b981; }   /* Green (LI) */
        .bg-duty-out { background-color: #dc2626; }   /* Red (DO) */
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-gray-200 font-sans antialiased">

    <div class="max-w-3xl mx-auto min-h-screen bg-white shadow-lg flex flex-col">
        <!-- App Bar -->
        <div class="p-4 bg-slate-800 text-white flex justify-between items-center sticky top-0 z-50">
            <div>
                <h1 class="text-lg font-bold leading-none uppercase tracking-tight">Gate Register</h1>
                <p id="stats" class="text-[10px] text-slate-400 mt-1 uppercase tracking-widest font-bold">Initializing...</p>
            </div>
            <div class="flex items-center gap-3">
                <button onclick="init()" class="text-[10px] bg-slate-700 px-2 py-1 rounded font-bold">REFRESH</button>
                <div id="syncIndicator" class="h-3 w-3 rounded-full bg-red-500 shadow-[0_0_8px_rgba(239,68,68,0.8)]"></div>
            </div>
        </div>

        <!-- Search Bar -->
        <div class="p-2 bg-slate-100 border-b sticky top-[60px] z-40">
            <input type="text" id="search" placeholder="Search Employee Name..." 
                   class="w-full p-3 rounded-xl border-2 border-slate-200 outline-none focus:border-blue-500 font-bold text-lg"
                   oninput="renderRegister()">
        </div>

        <!-- Register Content -->
        <div id="registerBody" class="flex-1 overflow-y-auto pb-24">
            <!-- Dynamic Content Load here -->
        </div>
    </div>

    <!-- Feedback Toast -->
    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-6 py-4 rounded-2xl font-bold text-sm hidden z-[100] shadow-2xl border border-slate-700 text-center">
    </div>

    <script>
        const SERVER_IP = '192.168.1.160';
        const API_URL = `http://${SERVER_IP}:5000`;
        const localDB = new PouchDB('gate_logs_v3');
        let employees = [];
        let openDepts = new Set(); 

        async function init() {
            try {
                const res = await fetch(`${API_URL}/employees`);
                if (res.ok) {
                    employees = await res.json();
                    renderRegister();
                }
            } catch (e) {
                console.error("Fetch error:", e);
                renderRegister(); 
            }
            syncData();
        }

        // Auto Refresh every 30 seconds to update times from server
        setInterval(init, 30000);
        // Sync check every 5 seconds
        setInterval(syncData, 5000);

        function toggleDept(dept) {
            if (openDepts.has(dept)) openDepts.delete(dept);
            else openDepts.add(dept);
            renderRegister();
        }

        function renderRegister() {
            const body = document.getElementById('registerBody');
            const searchTerm = document.getElementById('search').value.trim().toLowerCase();
            
            const depts = [...new Set(employees.map(e => e.DEPT_CODE))];
            
            let html = '';
            depts.forEach(dept => {
                const deptEmps = employees.filter(e => e.DEPT_CODE === dept && e.EMP_NAME.toLowerCase().includes(searchTerm));
                
                if (deptEmps.length > 0) {
                    const isOpen = openDepts.has(dept) || searchTerm.length > 0;
                    
                    html += `
                        <div onclick="toggleDept('${dept}')" class="dept-header px-4 py-4 flex justify-between items-center sticky top-[125px] z-30">
                            <span class="text-sm font-black text-slate-800 uppercase tracking-widest">${dept || 'GENERAL'}</span>
                            <div class="flex items-center gap-2">
                                <span class="bg-slate-300 text-slate-700 text-[10px] px-2 py-0.5 rounded-full font-bold">${deptEmps.length}</span>
                                <span class="text-slate-400 font-bold transition-transform ${isOpen ? 'rotate-180' : ''}">▼</span>
                            </div>
                        </div>
                        <div class="${isOpen ? 'block' : 'hidden'} bg-slate-50">
                    `;
                    
                    deptEmps.forEach(emp => {
                        html += `
                            <div class="flex items-center justify-between p-3 border-b border-white bg-white hover:bg-blue-50">
                                <div class="w-2/5 pr-2">
                                    <h3 class="font-bold text-slate-800 text-[12px] uppercase truncate">${emp.EMP_NAME}</h3>
                                    <p class="text-[10px] text-slate-500 font-bold leading-none mt-1">${emp.EMP_CODE}</p>
                                </div>
                                <div class="w-3/5 grid grid-cols-4 gap-1">
                                    ${renderButton(emp, 'DUTY IN', 'bg-duty-in', 'DI', emp.IN_TIME)}
                                    ${renderButton(emp, 'LUNCH OUT', 'bg-lunch-out', 'LO', emp.LUNCH_OUT)}
                                    ${renderButton(emp, 'LUNCH IN', 'bg-lunch-in', 'LI', emp.LUNCH_IN)}
                                    ${renderButton(emp, 'DUTY OUT', 'bg-duty-out', 'DO', emp.OUT_TIME)}
                                </div>
                            </div>
                        `;
                    });
                    html += `</div>`;
                }
            });
            body.innerHTML = html || '<div class="p-20 text-center text-slate-400 font-bold">No results matching your search</div>';
        }

        function renderButton(emp, action, colorClass, label, time) {
            const displayLabel = time ? time : label;
            const extraClass = time ? 'btn-done' : '';
            return `<button onclick="logQuick('${emp.EMP_CODE}', '${emp.EMP_NAME}', '${action}')" 
                            class="action-btn ${colorClass} ${extraClass} shadow-sm">
                        ${displayLabel}
                    </button>`;
        }

        async function logQuick(id, name, action) {
            const now = new Date();
            const timeOnly = String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');
            const timestamp = now.getFullYear() + '-' + 
                              String(now.getMonth() + 1).padStart(2, '0') + '-' + 
                              String(now.getDate()).padStart(2, '0') + ' ' + 
                              timeOnly + ':' + 
                              String(now.getSeconds()).padStart(2, '0');

            // Update UI immediately (Optimistic Update)
            const empIndex = employees.findIndex(e => e.EMP_CODE === id);
            if (empIndex > -1) {
                if (action === 'DUTY IN') employees[empIndex].IN_TIME = timeOnly;
                else if (action === 'LUNCH OUT') employees[empIndex].LUNCH_OUT = timeOnly;
                else if (action === 'LUNCH IN') employees[empIndex].LUNCH_IN = timeOnly;
                else if (action === 'DUTY OUT') employees[empIndex].OUT_TIME = timeOnly;
                renderRegister();
            }

            const entry = {
                _id: new Date().getTime().toString(),
                emp_id: id,
                emp_name: name,
                action: action,
                timestamp: timestamp,
                synced: false
            };

            await localDB.put(entry);
            
            const toast = document.getElementById('toast');
            toast.innerHTML = `<div class="text-[10px] opacity-70">${name}</div><div class="text-lg text-yellow-400">${action} @ ${timeOnly}</div>`;
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 2000);

            syncData();
        }

        async function syncData() {
            const indicator = document.getElementById('syncIndicator');
            const stats = document.getElementById('stats');
            
            try {
                const result = await localDB.allDocs({include_docs: true});
                const pending = result.rows.filter(r => !r.doc.synced);
                stats.innerText = pending.length > 0 ? `${pending.length} PENDING SYNC` : 'ALL DATA SYNCED';

                if (pending.length === 0) {
                    indicator.className = "h-3 w-3 rounded-full bg-green-500 shadow-[0_0_8px_rgba(34,197,94,0.8)]";
                    return;
                }

                indicator.className = "h-3 w-3 rounded-full bg-orange-500 animate-pulse";

                for (let row of pending) {
                    const log = row.doc;
                    try {
                        const res = await fetch(`${API_URL}/sync`, {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({
                                emp_id: log.emp_id,
                                action: log.action,
                                timestamp: log.timestamp
                            })
                        });
                        if (res.ok) {
                            log.synced = true;
                            await localDB.put(log);
                        }
                    } catch (err) {
                        console.error("Sync per-row error:", err);
                    }
                }
            } catch (e) {
                indicator.className = "h-3 w-3 rounded-full bg-red-500";
                stats.innerText = "SERVER OFFLINE";
            }
        }

        init();
    </script>
</body>
</html>
