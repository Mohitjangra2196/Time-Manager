<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gate Register - Quick Action View</title>
    <script src="https://cdn.jsdelivr.net/npm/pouchdb@8.0.1/dist/pouchdb.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .dept-header { background-color: #f1f5f9; border-top: 1px solid #cbd5e1; border-bottom: 1px solid #cbd5e1; cursor: pointer; }
        .action-btn { font-size: 10px; font-weight: 900; padding: 8px 4px; border-radius: 6px; text-align: center; color: white; transition: all 0.1s; }
        .action-btn:active { transform: scale(0.9); opacity: 0.8; }
        .bg-duty-in { background-color: #2563eb; }    /* Blue */
        .bg-lunch-out { background-color: #f59e0b; }  /* Orange */
        .bg-lunch-in { background-color: #10b981; }   /* Green */
        .bg-duty-out { background-color: #dc2626; }   /* Red */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .hidden-rows { display: none; }
    </style>
</head>
<body class="bg-gray-200 font-sans antialiased">

    <div class="max-w-3xl mx-auto min-h-screen bg-white shadow-lg flex flex-col">
        <!-- App Bar -->
        <div class="p-4 bg-slate-800 text-white flex justify-between items-center sticky top-0 z-50">
            <div>
                <h1 class="text-lg font-bold leading-none uppercase">Gate Register</h1>
                <p id="stats" class="text-[10px] text-slate-400 mt-1 uppercase tracking-widest font-bold">Syncing...</p>
            </div>
            <div id="syncIndicator" class="h-3 w-3 rounded-full bg-red-500 shadow-[0_0_8px_rgba(239,68,68,0.8)]"></div>
        </div>

        <!-- Search Bar -->
        <div class="p-2 bg-slate-100 border-b sticky top-[60px] z-40">
            <input type="text" id="search" placeholder="Search Name..." 
                   class="w-full p-3 rounded-xl border-2 border-slate-200 outline-none focus:border-blue-500 font-bold"
                   oninput="renderRegister()">
        </div>

        <!-- Register Content -->
        <div id="registerBody" class="flex-1 overflow-y-auto pb-24">
            <!-- Dynamic Content Load here -->
        </div>
    </div>

    <!-- Feedback Toast -->
    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-slate-800 text-white px-6 py-3 rounded-full font-bold text-sm hidden z-[100] shadow-2xl">
        Action Recorded!
    </div>

    <script>
        const SERVER_IP = '192.168.1.160';
        const API_URL = `http://${SERVER_IP}:5000`;
        const localDB = new PouchDB('gate_logs_v3');
        let employees = [];
        let openDepts = new Set(); // Track which depts are expanded

        async function init() {
            try {
                const res = await fetch(`${API_URL}/employees`);
                if (res.ok) {
                    employees = await res.json();
                    
                    // Nayi query ke hisab se unique departments nikalna
                    // Sorting is handled by Python/Oracle ORDER BY
                    const depts = [...new Set(employees.map(e => e.DEPT_CODE))];
                    
                    if(depts.length > 0) {
                        // Pehla department by default open rakhenge
                        openDepts.add(depts[0]);
                    }
                    renderRegister();
                }
            } catch (e) {
                console.error("Fetch error:", e);
                renderRegister(); 
            }
            setInterval(syncData, 5000);
            syncData();
        }

        function toggleDept(dept) {
            if (openDepts.has(dept)) openDepts.delete(dept);
            else openDepts.add(dept);
            renderRegister();
        }

        function renderRegister() {
            const body = document.getElementById('registerBody');
            const searchTerm = document.getElementById('search').value.toLowerCase();
            
            // Get unique departments in the order they appear from Oracle
            const depts = [];
            employees.forEach(e => {
                if (!depts.includes(e.DEPT_CODE)) depts.push(e.DEPT_CODE);
            });
            
            let html = '';
            depts.forEach(dept => {
                const deptEmps = employees.filter(e => e.DEPT_CODE === dept && e.EMP_NAME.toLowerCase().includes(searchTerm));
                
                if (deptEmps.length > 0) {
                    const isOpen = openDepts.has(dept) || searchTerm.length > 0;
                    
                    html += `
                        <div onclick="toggleDept('${dept}')" class="dept-header px-4 py-3 flex justify-between items-center sticky top-[125px] z-30">
                            <span class="text-xs font-black text-slate-700 uppercase tracking-wider">${dept || 'GENERAL'}</span>
                            <span class="text-slate-400 font-bold">${isOpen ? '▲' : '▼'}</span>
                        </div>
                        <div class="${isOpen ? '' : 'hidden'}">
                    `;
                    
                    deptEmps.forEach(emp => {
                        html += `
                            <div class="flex items-center justify-between p-3 border-b border-slate-50 bg-white">
                                <div class="w-1/3 overflow-hidden">
                                    <h3 class="font-bold text-slate-800 text-[12px] uppercase truncate">${emp.EMP_NAME}</h3>
                                    <p class="text-[9px] text-slate-400 font-bold leading-none mt-1">${emp.EMP_CODE}</p>
                                </div>
                                <div class="w-2/3 grid grid-cols-4 gap-1">
                                    <button onclick="logQuick('${emp.EMP_CODE}', '${emp.EMP_NAME}', 'DUTY IN')" class="action-btn bg-duty-in">DI</button>
                                    <button onclick="logQuick('${emp.EMP_CODE}', '${emp.EMP_NAME}', 'LUNCH OUT')" class="action-btn bg-lunch-out">LO</button>
                                    <button onclick="logQuick('${emp.EMP_CODE}', '${emp.EMP_NAME}', 'LUNCH IN')" class="action-btn bg-lunch-in">LI</button>
                                    <button onclick="logQuick('${emp.EMP_CODE}', '${emp.EMP_NAME}', 'DUTY OUT')" class="action-btn bg-duty-out">DO</button>
                                </div>
                            </div>
                        `;
                    });
                    html += `</div>`;
                }
            });
            body.innerHTML = html || '<div class="p-10 text-center text-slate-400">No employees found</div>';
        }

        async function logQuick(id, name, action) {
            const now = new Date();
            const timestamp = now.getFullYear() + '-' + 
                              String(now.getMonth() + 1).padStart(2, '0') + '-' + 
                              String(now.getDate()).padStart(2, '0') + ' ' + 
                              String(now.getHours()).padStart(2, '0') + ':' + 
                              String(now.getMinutes()).padStart(2, '0') + ':' + 
                              String(now.getSeconds()).padStart(2, '0');

            const entry = {
                _id: new Date().getTime().toString(),
                emp_id: id,
                emp_name: name,
                action: action,
                timestamp: timestamp,
                synced: false
            };

            await localDB.put(entry);
            
            const toast = document.getElementById('toast');
            toast.innerText = `${name} - ${action} OK`;
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 1500);

            syncData();
        }

        async function syncData() {
            const indicator = document.getElementById('syncIndicator');
            const stats = document.getElementById('stats');
            
            try {
                const result = await localDB.allDocs({include_docs: true});
                const pending = result.rows.filter(r => !r.doc.synced);
                stats.innerText = `${pending.length} PENDING SYNC`;

                if (pending.length === 0) {
                    indicator.className = "h-3 w-3 rounded-full bg-green-500 shadow-[0_0_8px_rgba(34,197,94,0.8)]";
                    return;
                }

                indicator.className = "h-3 w-3 rounded-full bg-orange-500 animate-pulse";

                for (let row of pending) {
                    const log = row.doc;
                    const res = await fetch(`${API_URL}/sync`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({
                            emp_id: log.emp_id,
                            action: log.action,
                            timestamp: log.timestamp
                        })
                    });
                    if (res.ok) {
                        log.synced = true;
                        await localDB.put(log);
                    }
                }
            } catch (e) {
                indicator.className = "h-3 w-3 rounded-full bg-red-500";
                stats.innerText = "OFFLINE MODE";
            }
        }

        init();
    </script>
</body>
</html>
